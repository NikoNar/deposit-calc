          "@type": "Question",
          "name": "What is compound interest and how does it work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Compound interest means you earn interest on your principal plus on previously earned interest. When the bank pays interest (e.g. annually, quarterly, or monthly), that interest is added to your balance and itself earns interest in the next period. Reinvesting earnings this way makes your savings grow faster over the long term than simple interest. This calculator shows the full compound interest effect for Armenian bank deposits."
